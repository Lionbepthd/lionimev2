<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lionime - Tempat Nonton Anime Gratis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            background-color: #2c2c2c;
            padding: 10px 0;
            text-align: center;
            border-bottom: 2px solid #ff6b6b;
        }

        .header h1 {
            margin: 0;
            color: #ff6b6b;
        }

        /* Navigasi Bawah */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #333;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .nav-item img {
            width: 30px;
            height: 30px;
        }

        .nav-item span {
            margin-top: 5px;
            font-size: 12px;
        }

        /* Input Pencarian */
        .search-container {
            margin: 20px 0;
            text-align: center;
        }

        .search-container input {
            padding: 10px;
            width: 70%;
            max-width: 500px;
            border-radius: 20px;
            border: none;
            background-color: #333;
            color: white;
        }

        .search-container button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #ff6b6b;
            color: white;
            cursor: pointer;
        }

        /* Daftar Anime Terbaru */
        .latest-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .latest-item {
            display: flex;
            background-color: #2c2c2c;
            padding: 10px;
            border-radius: 8px;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .latest-item .title {
            flex-grow: 1;
            margin-left: 10px;
        }

        .latest-item .title h4 {
            margin: 0 0 5px 0;
        }

        .latest-item .title .episode {
            color: #aaa;
            font-size: 14px;
        }

        .latest-item .episode-count {
            background-color: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* Anime Populer */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .anime-card {
            background-color: #2c2c2c;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .anime-card:hover {
            transform: translateY(-5px);
        }

        .anime-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .anime-info {
            padding: 10px;
        }

        .anime-info h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anime-info p {
            margin: 0;
            font-size: 12px;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }

        .section-title {
            margin-top: 30px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        /* Detail Anime */
        .back-button {
            margin-bottom: 20px;
        }

        .back-button a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .anime-detail {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .anime-image {
            flex-shrink: 0;
        }

        .anime-image img {
            width: 300px;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
        }

        .anime-info {
            flex-grow: 1;
        }

        .anime-info h1 {
            color: #ff6b6b;
        }

        .anime-info p {
            margin: 5px 0;
        }

        .anime-info .synopsis {
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Lionime</h1>
    </div>

    <!-- Input Pencarian -->
    <div class="container">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cari judul anime...">
            <button onclick="performSearch()">Cari</button>
        </div>
    </div>

    <!-- Container Utama -->
    <div class="container">
        <h2 class="section-title">Anime Terbaru</h2>
        <div id="latest-list" class="latest-list">
            <div class="loading">Memuat...</div>
        </div>

        <h2 class="section-title">Anime Populer</h2>
        <div id="popular-list" class="anime-grid">
            <div class="loading">Memuat...</div>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <div class="nav-bar">
        <a class="nav-item" href="list.html">
            <img src="https://anime-indo.lol/list.png" alt="List">
            <span>List</span>
        </a>
        <a class="nav-item" href="genre.html">
            <img src="https://anime-indo.lol/tv.png" alt="Genre">
            <span>Genre</span>
        </a>
        <a class="nav-item" href="movie.html">
            <img src="https://anime-indo.lol/video.png" alt="Movie">
            <span>Movie</span>
        </a>
        <a class="nav-item" href="schedule.html">
            <img src="https://anime-indo.lol/jadwal.png" alt="Jadwal">
            <span>Jadwal</span>
        </a>
    </div>

    <script>
        // Fungsi untuk mengambil data anime terbaru
        async function loadLatest() {
            const response = await fetch('https://api.jikan.moe/v4/anime?order_by=updated_at&sort=desc&limit=10');
            const data = await response.json();

            const latestListElement = document.getElementById('latest-list');
            latestListElement.innerHTML = '';

            data.data.forEach(anime => {
                const item = document.createElement('a');
                item.className = 'latest-item';
                item.href = `anime-detail.html?id=${anime.mal_id}`;
                const episodeTitle = `${anime.title}`;
                const episodes = anime.episodes ? `Episode ${anime.episodes}` : 'Episode ?';

                item.innerHTML = `
                    <div class="episode-count">${episodes}</div>
                    <div class="title">
                        <h4>${episodeTitle}</h4>
                        <div class="episode">${anime.genres.map(g => g.name).slice(0, 2).join(', ') || 'Genre Tidak Tersedia'}</div>
                    </div>
                `;

                latestListElement.appendChild(item);
            });
        }

        // Fungsi untuk mengambil anime populer
        async function loadPopular() {
            const response = await fetch('https://api.jikan.moe/v4/anime?order_by=members&sort=desc&limit=20');
            const data = await response.json();

            const popularListElement = document.getElementById('popular-list');
            popularListElement.innerHTML = '';

            data.data.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.onclick = () => window.location.href = `anime-detail.html?id=${anime.mal_id}`;

                const genres = anime.genres.map(g => g.name).slice(0, 2).join(', ');

                card.innerHTML = `
                    <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                    <div class="anime-info">
                        <h3>${anime.title}</h3>
                        <p>${genres || 'Genre Tidak Tersedia'}</p>
                    </div>
                `;

                popularListElement.appendChild(card);
            });
        }

        function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (query) {
                window.location.href = `list.html?search=${encodeURIComponent(query)}`;
            }
        }

        // Panggil fungsi saat halaman dimuat
        window.onload = function() {
            loadLatest();
            loadPopular();
        };
    </script>

</body>
</html>
