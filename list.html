<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Anime - Lionime</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            background-color: #2c2c2c;
            padding: 10px 0;
            text-align: center;
            border-bottom: 2px solid #ff6b6b;
        }

        .header h1 {
            margin: 0;
            color: #ff6b6b;
        }

        /* Navigasi Bawah */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #333;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .nav-item img {
            width: 30px;
            height: 30px;
        }

        .nav-item span {
            margin-top: 5px;
            font-size: 12px;
        }

        /* Input Pencarian */
        .search-container {
            margin: 20px 0;
            text-align: center;
        }

        .search-container input {
            padding: 10px;
            width: 70%;
            max-width: 500px;
            border-radius: 20px;
            border: none;
            background-color: #333;
            color: white;
        }

        .search-container button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: #ff6b6b;
            color: white;
            cursor: pointer;
        }

        /* Daftar Anime Terbaru */
        .latest-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .latest-item {
            display: flex;
            background-color: #2c2c2c;
            padding: 10px;
            border-radius: 8px;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .latest-item .title {
            flex-grow: 1;
            margin-left: 10px;
        }

        .latest-item .title h4 {
            margin: 0 0 5px 0;
        }

        .latest-item .title .episode {
            color: #aaa;
            font-size: 14px;
        }

        .latest-item .episode-count {
            background-color: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* Anime Populer */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .anime-card {
            background-color: #2c2c2c;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .anime-card:hover {
            transform: translateY(-5px);
        }

        .anime-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .anime-info {
            padding: 10px;
        }

        .anime-info h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anime-info p {
            margin: 0;
            font-size: 12px;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }

        .section-title {
            margin-top: 30px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        /* Detail Anime */
        .back-button {
            margin-bottom: 20px;
        }

        .back-button a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .anime-detail {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .anime-image {
            flex-shrink: 0;
        }

        .anime-image img {
            width: 300px;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
        }

        .anime-info {
            flex-grow: 1;
        }

        .anime-info h1 {
            color: #ff6b6b;
        }

        .anime-info p {
            margin: 5px 0;
        }

        .anime-info .synopsis {
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Lionime</h1>
    </div>

    <!-- Input Pencarian -->
    <div class="container">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Cari judul anime..." value="">
            <button onclick="performSearch()">Cari</button>
        </div>
    </div>

    <!-- Container Utama -->
    <div class="container">
        <h2 class="section-title">Anime Terbaru</h2>
        <div id="latest-list" class="latest-list">
            <div class="loading">Memuat...</div>
        </div>

        <h2 class="section-title">Anime Populer</h2>
        <div id="popular-list" class="anime-grid">
            <div class="loading">Memuat...</div>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <div class="nav-bar">
        <a class="nav-item" href="index.html">
            <img src="https://anime-indo.lol/list.png" alt="List">
            <span>List</span>
        </a>
        <a class="nav-item" href="genre.html">
            <img src="https://anime-indo.lol/tv.png" alt="Genre">
            <span>Genre</span>
        </a>
        <a class="nav-item" href="movie.html">
            <img src="https://anime-indo.lol/video.png" alt="Movie">
            <span>Movie</span>
        </a>
        <a class="nav-item" href="schedule.html">
            <img src="https://anime-indo.lol/jadwal.png" alt="Jadwal">
            <span>Jadwal</span>
        </a>
    </div>

    <script>
        // Fungsi untuk mengambil data anime terbaru
        async function loadLatest() {
            const response = await fetch('https://api.jikan.moe/v4/anime?order_by=updated_at&sort=desc&limit=10');
            const data = await response.json();

            const latestListElement = document.getElementById('latest-list');
            latestListElement.innerHTML = '';

            data.data.forEach(anime => {
                const item = document.createElement('a');
                item.className = 'latest-item';
                item.href = `#detail-${anime.mal_id}`;
                item.onclick = (e) => {
                    e.preventDefault();
                    showAnimeDetail(anime.mal_id);
                };
                const episodeTitle = `${anime.title}`;
                const episodes = anime.episodes ? `Episode ${anime.episodes}` : 'Episode ?';

                item.innerHTML = `
                    <div class="episode-count">${episodes}</div>
                    <div class="title">
                        <h4>${episodeTitle}</h4>
                        <div class="episode">${anime.genres.map(g => g.name).slice(0, 2).join(', ') || 'Genre Tidak Tersedia'}</div>
                    </div>
                `;

                latestListElement.appendChild(item);
            });
        }

        // Fungsi untuk mengambil anime populer atau hasil pencarian
        async function loadPopular(searchQuery = null) {
            const popularListElement = document.getElementById('popular-list');
            popularListElement.innerHTML = '<div class="loading">Memuat...</div>';

            // Ambil query pencarian dari URL jika tidak diberikan
            if (searchQuery === null) {
                const urlParams = new URLSearchParams(window.location.search);
                searchQuery = urlParams.get('search');
            }

            const endpoint = searchQuery
                ? `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(searchQuery)}&limit=20`
                : 'https://api.jikan.moe/v4/anime?order_by=members&sort=desc&limit=20';

            try {
                const response = await fetch(endpoint);
                const data = await response.json();

                popularListElement.innerHTML = '';

                if (data.data.length === 0 && searchQuery) {
                     popularListElement.innerHTML = `<p>Tidak ada hasil untuk "${searchQuery}".</p>`;
                     return;
                }

                data.data.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.onclick = () => showAnimeDetail(anime.mal_id);

                    const genres = anime.genres.map(g => g.name).slice(0, 2).join(', ');

                    card.innerHTML = `
                        <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                        <div class="anime-info">
                            <h3>${anime.title}</h3>
                            <p>${genres || 'Genre Tidak Tersedia'}</p>
                        </div>
                    `;

                    popularListElement.appendChild(card);
                });
            } catch (error) {
                popularListElement.innerHTML = `<p>Terjadi kesalahan saat memuat anime: ${error.message}</p>`;
            }
        }

        // Fungsi untuk menampilkan detail anime di halaman yang sama
        async function showAnimeDetail(malId) {
            const container = document.querySelector('.container');
            container.innerHTML = '<div class="loading">Memuat detail anime...</div>';

            try {
                const response = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
                const data = await response.json();
                const anime = data.data;

                // Format informasi
                const title = anime.title;
                const imageUrl = anime.images.jpg.image_url;
                const episodes = anime.episodes || 'Tidak Diketahui';
                const status = anime.status;
                const aired = anime.aired.string;
                const genres = anime.genres.map(g => g.name).join(', ');
                const score = anime.score;
                const synopsis = anime.synopsis || 'Synopsis tidak tersedia.';

                container.innerHTML = `
                    <div class="back-button">
                        <a href="#" onclick="history.back(); return false;">&larr; Kembali ke Daftar</a>
                    </div>
                    <div class="anime-detail">
                        <div class="anime-image">
                            <img src="${imageUrl}" alt="${title}">
                        </div>
                        <div class="anime-info">
                            <h1>${title}</h1>
                            <p><strong>Episode:</strong> ${episodes}</p>
                            <p><strong>Status:</strong> ${status}</p>
                            <p><strong>Tanggal Rilis:</strong> ${aired}</p>
                            <p><strong>Genre:</strong> ${genres}</p>
                            <p><strong>Skor:</strong> ${score}</p>
                            <div class="synopsis">
                                <h3>Sinopsis:</h3>
                                <p>${synopsis}</p>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<p>Terjadi kesalahan saat memuat detail anime: ${error.message}</p>`;
            }
        }

        function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (query) {
                // Ganti URL dengan parameter pencarian
                window.location.href = `list.html?search=${encodeURIComponent(query)}`;
            }
        }

        // Panggil fungsi saat halaman dimuat
        window.onload = function() {
            // Ambil query pencarian dari URL
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            if (searchQuery) {
                // Jika ada query pencarian di URL, isi input dan muat hasil pencarian
                document.getElementById('search-input').value = searchQuery;
                loadLatest(); // Tetap muat latest untuk tampilan lengkap
                loadPopular(searchQuery); // Muat hasil pencarian
            } else {
                // Jika tidak ada query, muat seperti biasa
                loadLatest();
                loadPopular();
            }
        };
    </script>

</body>
</html>
