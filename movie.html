<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Anime - Lionime</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            background-color: #2c2c2c;
            padding: 10px 0;
            text-align: center;
            border-bottom: 2px solid #ff6b6b;
        }

        .header h1 {
            margin: 0;
            color: #ff6b6b;
        }

        /* Navigasi Bawah */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #333;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .nav-item img {
            width: 30px;
            height: 30px;
        }

        .nav-item span {
            margin-top: 5px;
            font-size: 12px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .anime-card {
            background-color: #2c2c2c;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .anime-card:hover {
            transform: translateY(-5px);
        }

        .anime-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .anime-info {
            padding: 10px;
        }

        .anime-info h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anime-info p {
            margin: 0;
            font-size: 12px;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }

        .section-title {
            margin-top: 30px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        /* Detail Anime */
        .back-button {
            margin-bottom: 20px;
        }

        .back-button a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .anime-detail {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .anime-image {
            flex-shrink: 0;
        }

        .anime-image img {
            width: 300px;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
        }

        .anime-info {
            flex-grow: 1;
        }

        .anime-info h1 {
            color: #ff6b6b;
        }

        .anime-info p {
            margin: 5px 0;
        }

        .anime-info .synopsis {
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Lionime</h1>
    </div>

    <!-- Container Utama -->
    <div class="container">
        <h2 class="section-title">Film Anime Populer</h2>
        <div id="movie-list" class="anime-grid">
            <div class="loading">Memuat...</div>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <div class="nav-bar">
        <a class="nav-item" href="index.html">
            <img src="https://anime-indo.lol/list.png" alt="List">
            <span>List</span>
        </a>
        <a class="nav-item" href="genre.html">
            <img src="https://anime-indo.lol/tv.png" alt="Genre">
            <span>Genre</span>
        </a>
        <a class="nav-item" href="movie.html">
            <img src="https://anime-indo.lol/video.png" alt="Movie">
            <span>Movie</span>
        </a>
        <a class="nav-item" href="schedule.html">
            <img src="https://anime-indo.lol/jadwal.png" alt="Jadwal">
            <span>Jadwal</span>
        </a>
    </div>

    <script>
        async function loadMovies() {
            const movieListElement = document.getElementById('movie-list');
            movieListElement.innerHTML = '<div class="loading">Memuat Movie...</div>';

            try {
                const response = await fetch('https://www.sankavollerei.com/anime/samehadaku/movies?page=1');
                const data = await response.json();

                movieListElement.innerHTML = '';

                // Asumsikan data dalam bentuk array di data.data
                if (data.data && Array.isArray(data.data)) {
                    data.data.forEach(anime => {
                        const card = document.createElement('div');
                        card.className = 'anime-card';
                        card.onclick = () => window.location.href = `anime-detail.html?id=${encodeURIComponent(anime.slug)}`;

                        const genres = anime.genres ? anime.genres.join(', ') : 'Genre Tidak Tersedia';

                        card.innerHTML = `
                            <img src="${anime.image}" alt="${anime.title}">
                            <div class="anime-info">
                                <h3>${anime.title}</h3>
                                <p>${genres}</p>
                            </div>
                        `;

                        movieListElement.appendChild(card);
                    });
                } else {
                    movieListElement.innerHTML = '<p>Tidak ada film anime yang tersedia.</p>';
                }
            } catch (error) {
                movieListElement.innerHTML = `<p>Terjadi kesalahan saat memuat film: ${error.message}</p>`;
            }
        }

        window.onload = loadMovies;
    </script>

</body>
</html>
