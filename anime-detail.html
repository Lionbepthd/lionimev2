<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Lionime</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            background-color: #2c2c2c;
            padding: 10px 0;
            text-align: center;
            border-bottom: 2px solid #ff6b6b;
        }

        .header h1 {
            margin: 0;
            color: #ff6b6b;
        }

        /* Navigasi Bawah */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #333;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .nav-item img {
            width: 30px;
            height: 30px;
        }

        .nav-item span {
            margin-top: 5px;
            font-size: 12px;
        }

        .back-button {
            margin-bottom: 20px;
        }

        .back-button a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .anime-detail {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .anime-image {
            flex-shrink: 0;
        }

        .anime-image img {
            width: 300px;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
        }

        .anime-info {
            flex-grow: 1;
        }

        .anime-info h1 {
            color: #ff6b6b;
        }

        .anime-info p {
            margin: 5px 0;
        }

        .anime-info .synopsis {
            margin-top: 20px;
            line-height: 1.6;
        }

        .watch-button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Lionime</h1>
    </div>

    <!-- Container Utama -->
    <div class="container" id="main-container">
        <div class="loading">Memuat detail anime...</div>
    </div>

    <!-- Navigasi Bawah -->
    <div class="nav-bar">
        <a class="nav-item" href="index.html">
            <img src="https://anime-indo.lol/list.png" alt="List">
            <span>List</span>
        </a>
        <a class="nav-item" href="genre.html">
            <img src="https://anime-indo.lol/tv.png" alt="Genre">
            <span>Genre</span>
        </a>
        <a class="nav-item" href="movie.html">
            <img src="https://anime-indo.lol/video.png" alt="Movie">
            <span>Movie</span>
        </a>
        <a class="nav-item" href="schedule.html">
            <img src="https://anime-indo.lol/jadwal.png" alt="Jadwal">
            <span>Jadwal</span>
        </a>
    </div>

    <script>
        // Ambil ID (slug) dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const animeSlug = urlParams.get('id');

        if (!animeSlug) {
            document.getElementById('main-container').innerHTML = '<p>ID Anime tidak ditemukan.</p>';
        } else {
            loadAnimeDetail(animeSlug);
        }

        async function loadAnimeDetail(slug) {
            const container = document.getElementById('main-container');

            try {
                // Ambil detail dari API baru
                const response = await fetch(`https://www.sankavollerei.com/anime/samehadaku/anime/${slug}`);
                const data = await response.json();

                // Pastikan data ada
                if (!data.data) {
                    container.innerHTML = '<p>Detail anime tidak ditemukan.</p>';
                    return;
                }

                const anime = data.data;

                // Format informasi
                const title = anime.title;
                const imageUrl = anime.image || 'https://via.placeholder.com/300x400'; // Gambar placeholder jika tidak ada
                const episodes = anime.episodes || 'Tidak Diketahui';
                const status = anime.status || 'Status Tidak Diketahui';
                const aired = anime.aired || 'Tanggal Rilis Tidak Diketahui';
                const genres = anime.genres ? anime.genres.join(', ') : 'Genre Tidak Tersedia';
                const score = anime.score || 'Skor Tidak Tersedia';
                const synopsis = anime.synopsis || 'Synopsis tidak tersedia.';

                document.getElementById('page-title').textContent = `${title} - Lionime`;

                container.innerHTML = `
                    <div class="back-button">
                        <a href="javascript:history.back()">&larr; Kembali</a>
                    </div>
                    <div class="anime-detail">
                        <div class="anime-image">
                            <img src="${imageUrl}" alt="${title}">
                        </div>
                        <div class="anime-info">
                            <h1>${title}</h1>
                            <p><strong>Episode:</strong> ${episodes}</p>
                            <p><strong>Status:</strong> ${status}</p>
                            <p><strong>Tanggal Rilis:</strong> ${aired}</p>
                            <p><strong>Genre:</strong> ${genres}</p>
                            <p><strong>Skor:</strong> ${score}</p>
                            <div class="synopsis">
                                <h3>Sinopsis:</h3>
                                <p>${synopsis}</p>
                            </div>
                            <a href="episode.html?id=${encodeURIComponent(slug)}" class="watch-button">Tonton Semua Episode</a>
                        </div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<p>Terjadi kesalahan saat memuat detail anime: ${error.message}</p>`;
            }
        }
    </script>

</body>
</html>
