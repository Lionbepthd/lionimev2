<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genre Anime - Lionime</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            background-color: #2c2c2c;
            padding: 10px 0;
            text-align: center;
            border-bottom: 2px solid #ff6b6b;
        }

        .header h1 {
            margin: 0;
            color: #ff6b6b;
        }

        /* Navigasi Bawah */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #333;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .nav-item img {
            width: 30px;
            height: 30px;
        }

        .nav-item span {
            margin-top: 5px;
            font-size: 12px;
        }

        .genre-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .genre-button {
            background-color: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .anime-card {
            background-color: #2c2c2c;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .anime-card:hover {
            transform: translateY(-5px);
        }

        .anime-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .anime-info {
            padding: 10px;
        }

        .anime-info h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .anime-info p {
            margin: 0;
            font-size: 12px;
            color: #aaa;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }

        .section-title {
            margin-top: 30px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        /* Detail Anime */
        .back-button {
            margin-bottom: 20px;
        }

        .back-button a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .anime-detail {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .anime-image {
            flex-shrink: 0;
        }

        .anime-image img {
            width: 300px;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
        }

        .anime-info {
            flex-grow: 1;
        }

        .anime-info h1 {
            color: #ff6b6b;
        }

        .anime-info p {
            margin: 5px 0;
        }

        .anime-info .synopsis {
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Lionime</h1>
    </div>

    <!-- Container Utama -->
    <div class="container">
        <h2 class="section-title">Pilih Genre:</h2>
        <div id="genre-buttons" class="genre-buttons">
            <div class="loading">Memuat Opsi Genre...</div>
        </div>

        <h2 class="section-title" id="genre-title" style="display: none;">Anime Berdasarkan Genre:</h2>
        <div id="genre-list" class="anime-grid">
            <!-- Hasil akan ditampilkan di sini -->
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <div class="nav-bar">
        <a class="nav-item" href="index.html">
            <img src="https://anime-indo.lol/list.png" alt="List">
            <span>List</span>
        </a>
        <a class="nav-item" href="genre.html">
            <img src="https://anime-indo.lol/tv.png" alt="Genre">
            <span>Genre</span>
        </a>
        <a class="nav-item" href="movie.html">
            <img src="https://anime-indo.lol/video.png" alt="Movie">
            <span>Movie</span>
        </a>
        <a class="nav-item" href="schedule.html">
            <img src="https://anime-indo.lol/jadwal.png" alt="Jadwal">
            <span>Jadwal</span>
        </a>
    </div>

    <script>
        async function loadGenreOptions() {
            const genreButtonsElement = document.getElementById('genre-buttons');
            genreButtonsElement.innerHTML = '<div class="loading">Memuat Opsi Genre...</div>';

            try {
                const response = await fetch('https://api.jikan.moe/v4/genres/anime');
                const data = await response.json();

                genreButtonsElement.innerHTML = '';

                data.data.forEach(genre => {
                    const button = document.createElement('button');
                    button.textContent = genre.name;
                    button.className = 'genre-button';
                    button.onclick = () => loadAnimeByGenre(genre.mal_id, genre.name);

                    genreButtonsElement.appendChild(button);
                });
            } catch (error) {
                genreButtonsElement.innerHTML = `<p>Terjadi kesalahan saat memuat genre: ${error.message}</p>`;
            }
        }

        async function loadAnimeByGenre(genreId, genreName) {
            const genreListElement = document.getElementById('genre-list');
            const genreTitleElement = document.getElementById('genre-title');

            genreListElement.innerHTML = '<div class="loading">Memuat...</div>';
            genreTitleElement.textContent = `Anime Genre: ${genreName}`;
            genreTitleElement.style.display = 'block';

            try {
                const response = await fetch(`https://api.jikan.moe/v4/anime?genres=${genreId}&order_by=members&sort=desc&limit=20`);
                const data = await response.json();

                genreListElement.innerHTML = '';

                data.data.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.onclick = () => window.location.href = `anime-detail.html?id=${anime.mal_id}`;

                    const genres = anime.genres.map(g => g.name).slice(0, 2).join(', ');

                    card.innerHTML = `
                        <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                        <div class="anime-info">
                            <h3>${anime.title}</h3>
                            <p>${genres || 'Genre Tidak Tersedia'}</p>
                        </div>
                    `;

                    genreListElement.appendChild(card);
                });
            } catch (error) {
                genreListElement.innerHTML = `<p>Terjadi kesalahan saat memuat anime: ${error.message}</p>`;
            }
        }

        window.onload = loadGenreOptions;
    </script>

</body>
</html>
