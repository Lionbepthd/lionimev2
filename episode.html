<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Episode - Lionime</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            background-color: #2c2c2c;
            padding: 10px 0;
            text-align: center;
            border-bottom: 2px solid #ff6b6b;
        }

        .header h1 {
            margin: 0;
            color: #ff6b6b;
        }

        /* Navigasi Bawah */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #333;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .nav-item img {
            width: 30px;
            height: 30px;
        }

        .nav-item span {
            margin-top: 5px;
            font-size: 12px;
        }

        .back-button {
            margin-bottom: 20px;
        }

        .back-button a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .episode-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .episode-item {
            background-color: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .episode-item:hover {
            background-color: #3c3c3c;
        }

        .episode-title {
            flex-grow: 1;
        }

        .episode-number {
            background-color: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }

        .section-title {
            margin-top: 30px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>Lionime</h1>
    </div>

    <!-- Container Utama -->
    <div class="container" id="main-container">
        <div class="loading">Memuat daftar episode...</div>
    </div>

    <!-- Navigasi Bawah -->
    <div class="nav-bar">
        <a class="nav-item" href="index.html">
            <img src="https://anime-indo.lol/list.png" alt="List">
            <span>List</span>
        </a>
        <a class="nav-item" href="genre.html">
            <img src="https://anime-indo.lol/tv.png" alt="Genre">
            <span>Genre</span>
        </a>
        <a class="nav-item" href="movie.html">
            <img src="https://anime-indo.lol/video.png" alt="Movie">
            <span>Movie</span>
        </a>
        <a class="nav-item" href="schedule.html">
            <img src="https://anime-indo.lol/jadwal.png" alt="Jadwal">
            <span>Jadwal</span>
        </a>
    </div>

    <script>
        // Ambil judul dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const animeTitle = urlParams.get('title');

        if (!animeTitle) {
            document.getElementById('main-container').innerHTML = '<p>Judul Anime tidak ditemukan.</p>';
        } else {
            loadEpisodes(animeTitle);
        }

        async function loadEpisodes(title) {
            const container = document.getElementById('main-container');

            try {
                // Langkah 1: Cari anime di wajik-anime-api berdasarkan judul
                const searchResponse = await fetch(`https://wajik-anime-api.vercel.app/samehadaku/search?q=${encodeURIComponent(title)}`);
                const searchData = await searchResponse.json();

                // Ambil anime pertama dari hasil pencarian
                if (!searchData.data || searchData.data.length === 0) {
                    container.innerHTML = `<p>Tidak ditemukan anime "${title}" di database streaming.</p>`;
                    return;
                }

                const animeInfo = searchData.data[0];
                const animeId = animeInfo.animeId; // Ambil animeId dari hasil pencarian

                // Langkah 2: Ambil detail anime (termasuk daftar episode) dari wajik-anime-api
                const detailResponse = await fetch(`https://wajik-anime-api.vercel.app/samehadaku/anime/${animeId}`);
                const detailData = await detailResponse.json();

                if (!detailData.data || !detailData.data.episodes) {
                    container.innerHTML = `<p>Daftar episode untuk "${title}" tidak ditemukan.</p>`;
                    return;
                }

                const episodes = detailData.data.episodes;

                container.innerHTML = `
                    <div class="back-button">
                        <a href="anime-detail.html?id=${detailData.data.mal_id || ''}">&larr; Kembali ke Detail</a> <!-- Kembali ke detail Jikan jika memungkinkan -->
                    </div>
                    <h2 class="section-title">Daftar Episode: ${title}</h2>
                    <div class="episode-list">
                `;

                episodes.forEach(ep => {
                    // ep.id adalah episodeId yang dibutuhkan untuk /episode/{episodeId}
                    const epNum = ep.title; // Gunakan title atau episode number jika tersedia
                    const episodeId = ep.id; // Ini adalah ID yang benar dari wajik-anime-api

                    container.innerHTML += `
                        <a href="stream.html?id=${encodeURIComponent(episodeId)}" class="episode-item">
                            <div class="episode-title">${epNum}</div>
                            <div class="episode-number">Tonton</div>
                        </a>
                    `;
                });

                container.innerHTML += `</div>`; // Tutup episode-list

            } catch (error) {
                container.innerHTML = `<p>Terjadi kesalahan saat memuat daftar episode: ${error.message}</p>`;
            }
        }
    </script>

</body>
</html>
